appId: ${APP_ID}
tags:
  - backup
  - parallel
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      isE2ETest: true
- runFlow: ../../utils/Prepare.yaml
- runFlow: ../../utils/ImportWalletWithKey.yaml

# Navigate to settings and backup section
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: settings-menu
      - tapOn: 'Settings'
- tapOn:
    id: backup-section
- tapOn:
    id: backup-now-button
# This part of the test is different for iOS and Android.
- runFlow:
    when:
      platform: Android
    commands:
      # Google may show a new "Sign in with ease" phone-lookup interstitial
      # before the account picker — accept it as confirmation that the
      # login flow opened. We're about to press back to cancel anyway
      # since this test is for manual backup, not cloud backup.
      - assertVisible: '(Sign in|Choose an account|Sign in with ease)'
      # On certain android versions this requires backing twice.
      - retry:
          maxRetries: 2
          commands:
            - back
            - assertVisible: 'Wallets & Backup'
- runFlow:
    when:
      platform: iOS
    commands:
      - assertVisible: 'iCloud Not Enabled'
      - tapOn: 'No thanks'
      - assertVisible: 'Wallets & Backup'

- assertVisible: '.*Enable Cloud Backups'

# Navigate to manual backup screen
- tapOn: '.*Private Key 1.*'
- assertVisible: 'Not backed up'
- tapOn:
    id: back-up-manually
- tapOn:
    id: show-secret-button
- runFlow: ../../utils/MaybeInputPin.yaml
- tapOn:
    id: saved-these-words
- assertVisible: 'Wallets & Backup'
