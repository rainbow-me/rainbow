appId: ${APP_ID}
tags:
  - cash
  - parallel
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      isE2ETest: true
- runFlow: ../../utils/Prepare.yaml
- runFlow: ../../utils/ImportWalletWithKey.yaml
- runFlow:
    file: ../../utils/SetExperimentalFlag.yaml
    env:
      FLAG: Cash
      VALUE: 'true'
- runFlow:
    file: ../../utils/SetCashDepositSetupStatus.yaml
    env:
      STATUS: ready
# A ready member lands straight on the Add Cash presets sheet.
- tapOn:
    id: buy-button
- assertVisible:
    id: cash-deposit-add-cash-amount-more
# Tapping the "•••" chip flips the sheet into the full-screen keypad amount entry.
- tapOn:
    id: cash-deposit-add-cash-amount-more
- assertVisible:
    id: cash-deposit-add-cash-amount-display
# With nothing entered the action button is disabled — its label reads "Enter Amount".
# The enabled "Hold to Add" label is prefixed with an SF Symbol glyph, so match it with a leading `.*`.
- assertVisible:
    text: 'Enter Amount'
- assertNotVisible:
    text: '.*Hold to Add'
# Entering a non-zero amount updates the big-number display and enables the button.
# The display formats the value with a "$" prefix; `text` is a full-match regex, so escape the "$".
- tapOn:
    id: number-pad-key-5
- assertVisible:
    text: '\$5'
    childOf:
      id: cash-deposit-add-cash-amount-display-container
- assertVisible:
    text: '.*Hold to Add'
- assertNotVisible:
    text: 'Enter Amount'
# Holding the action button submits the custom amount as a mock Ramp buy order.
# The mock advances one status per ~2s poll: Pending -> Processing -> Processing -> Completed (~6s total).
- longPressOn:
    id: cash-deposit-add-cash-hold-to-add
# On completion the order watcher surfaces the "Request Successful" alert; dismissing it returns to home.
- extendedWaitUntil:
    visible:
      text: 'Request Successful'
    timeout: 10000
- tapOn:
    text: 'OK'
- assertVisible:
    id: buy-button
