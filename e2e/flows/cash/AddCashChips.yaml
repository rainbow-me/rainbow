appId: ${APP_ID}
tags:
  - cash
  - parallel
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      isE2ETest: true
- runFlow: ../../utils/Prepare.yaml
- runFlow: ../../utils/ImportWalletWithKey.yaml
- runFlow:
    file: ../../utils/SetExperimentalFlag.yaml
    env:
      FLAG: Cash
      VALUE: 'true'
- runFlow:
    file: ../../utils/SetCashDepositSetupStatus.yaml
    env:
      STATUS: ready
# A ready member skips the intro panel and lands straight on the Add Cash presets sheet.
- tapOn:
    id: buy-button
- assertVisible:
    id: cash-deposit-add-cash-add-from
- assertVisible:
    id: cash-deposit-add-cash-amount-50
- assertVisible:
    id: cash-deposit-add-cash-hold-to-add
- assertNotVisible:
    id: cash-deposit-intro-set-up-account
# Selecting a preset chip and holding the action button creates a mock Ramp buy order.
# The mock advances one status per ~2s poll: Pending -> Processing -> Processing -> Completed (~6s total).
- tapOn:
    id: cash-deposit-add-cash-amount-100
- longPressOn:
    id: cash-deposit-add-cash-hold-to-add
# On completion the sheet closes back to home; wait for that before switching tabs.
- extendedWaitUntil:
    visible:
      id: buy-button
    timeout: 20000
# The tab bar has no testID, so tap the Activity tab by coordinate.
- runScript:
    file: ../../utils/coordinates.js
- tapOn:
    point: ${output.tabCoordinates.activityTab}
- extendedWaitUntil:
    visible:
      text: 'Purchased'
    timeout: 30000
- assertVisible:
    text: '.*\+\$100.*'
