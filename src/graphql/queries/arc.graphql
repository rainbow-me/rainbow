query getPoapEventByQrHash($qrHash: String!) {
  getPoapEventByQrHash(qrHash: $qrHash) {
    id
    name
    imageUrl
    createdAt
    qrHash
    secret
  }
}

query claimPoapByQrHash($walletAddress: String!, $qrHash: String!, $secret: String!) {
  claimPoapByQrHash(walletAddress: $walletAddress, qrHash: $qrHash, secret: $secret) {
    success
    error
  }
}

query getPoapEventBySecretWord($secretWord: String!) {
  getPoapEventBySecretWord(secretWord: $secretWord) {
    id
    name
    imageUrl
    createdAt
    qrHash
    secretWord
  }
}

query claimPoapBySecretWord($walletAddress: String!, $secretWord: String!) {
  claimPoapBySecretWord(walletAddress: $walletAddress, secretWord: $secretWord) {
    success
    error
  }
}

fragment simpleHashPaymentToken on SimpleHashPaymentToken {
  payment_token_id
  name
  symbol
  address
  decimals
}

query getNFTs($walletAddress: String!, $sortBy: NFTCollectionSortCriterion, $sortDirection: SortDirection) {
  nftsV2(walletAddress: $walletAddress, sortBy: $sortBy, sortDirection: $sortDirection) {
    nft_id
    chain
    contract_address
    token_id
    name
    description
    previews {
      image_small_url
      image_medium_url
      image_large_url
      image_opengraph_url
      blurhash
      predominant_color
    }
    image_url
    image_properties {
      width
      height
      size
      mime_type
    }
    video_url
    video_properties {
      width
      height
      duration
      video_coding
      audio_coding
      size
      mime_type
    }
    audio_url
    audio_properties {
      duration
      audio_coding
      size
      mime_type
    }
    model_url
    model_properties {
      size
      mime_type
    }
    background_color
    external_url
    created_date
    status
    token_count
    owner_count
    owners {
      owner_address
      quantity
      first_acquired_date
      last_acquired_date
    }
    last_sale {
      from_address
      to_address
      quantity
      quantity_string
      timestamp
      transaction
      marketplace_id
      marketplace_name
      is_bundle_sale
      payment_token {
        ...simpleHashPaymentToken
      }
      unit_price
      total_price
      unit_price_usd_cents
    }
    first_created {
      minted_to
      quantity
      quantity_string
      timestamp
      block_number
      transaction
      transaction_initiator
    }
    contract {
      type
      name
      symbol
      deployed_by
      deployed_via_contract
      owned_by
      has_multiple_collections
    }
    collection {
      collection_id
      name
      description
      image_url
      banner_image_url
      category
      is_nsfw
      external_url
      twitter_username
      discord_url
      instagram_url
      medium_username
      telegram_url
      marketplace_pages {
        marketplace_id
        marketplace_name
        marketplace_collection_id
        nft_url
        collection_url
        verified
      }
      metaplex_mint
      metaplex_candy_machine
      metaplex_first_verified_creator
      spam_score
      floor_prices {
        marketplace_id
        value
        payment_token {
          ...simpleHashPaymentToken
        }
        value_usd_cents
      }
      top_bids {
        marketplace_id
        value
        payment_token {
          ...simpleHashPaymentToken
        }
        value_usd_cents
      }
      distinct_owner_count
      distinct_nft_count
      total_quantity
      chains
      top_contracts
      collection_royalties {
        source
        total_creator_fee_basis_points
        recipients {
          address
          percentage
          basis_points
        }
      }
    }
    rarity {
      rank
      score
      unique_attributes
    }
    royalty {
      source
      total_creator_fee_basis_points
      recipients {
        address
        percentage
        basis_points
      }
    }
    extra_metadata {
      image_original_url
      animation_original_url
      metadata_original_url
      attributes {
        trait_type
        value
        display_type
      }
    }
  }
}

query getNftCollections($walletAddress: String!, $limit: Int, $pageKey: String) {
  nftCollections(walletAddress: $walletAddress, limit: $limit, pageKey: $pageKey) {
    data {
      id
      name
      imageUrl
      totalCount
    }
    totalCollections
    nextPageKey
  }
}

query getNftsByCollection($walletAddress: String!, $collectionId: String!) {
  nftsByCollection(walletAddress: $walletAddress, collectionId: $collectionId) {
    name
    acquiredAt
    uniqueId
    description
    standard
    isSendable
    backgroundColor
    images {
      highResUrl
      lowResUrl
      mimeType
      animatedUrl
      animatedMimeType
    }
    type
    backgroundColor
    collectionName
    collectionUrl
    collectionDescription
    collectionImageUrl
    discordUrl
    twitterUrl
    websiteUrl
    marketplaceName
    marketplaceUrl
    floorPrice
    traits {
      trait_type
      value
    }
  }
}

query getNftsMetadata($walletAddress: String!, $tokens: JSON!) {
  getNftsMetadata(walletAddress: $walletAddress, tokens: $tokens) {
    name
    acquiredAt
    uniqueId
    description
    standard
    isSendable
    backgroundColor
    images {
      highResUrl
      lowResUrl
      mimeType
      animatedUrl
      animatedMimeType
    }
    type
    backgroundColor
    collectionName
    collectionUrl
    collectionDescription
    collectionImageUrl
    discordUrl
    twitterUrl
    websiteUrl
    marketplaceName
    marketplaceUrl
    floorPrice
    traits {
      trait_type
      value
    }
  }
}

query getFeaturedResults($placementId: String!, $walletAddress: String!, $country: String, $limit: Int) {
  featuredResults(placementId: $placementId, walletAddress: $walletAddress, country: $country, limit: $limit) {
    items {
      id
      type
      impressionId
      advertiserId
      placementSlug
      title
      context {
        text
      }
      description
      imageUrl
      category
      imageAltText
      ctas {
        title
        href
      }
    }
  }
}

mutation trackFeaturedResult(
  $type: TrackFeaturedResultType!
  $placementId: String!
  $impressionId: String!
  $featuredResultCreativeId: String!
) {
  trackFeaturedResult(
    type: $type
    placementId: $placementId
    impressionId: $impressionId
    featuredResultCreativeId: $featuredResultCreativeId
  ) {
    message
  }
}
