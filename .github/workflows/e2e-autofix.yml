name: E2E Autofix
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
        type: string
      pr_branch:
        description: 'PR branch name'
        required: true
        type: string
      failed_tests:
        description: 'Comma-separated failed test names (e.g. CreateWallet,WatchedWallet)'
        required: true
        type: string
      failed_flows:
        description: 'Comma-separated flow paths (e.g. e2e/flows/onboarding/CreateWallet.yaml)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Autofix E2E Tests
    # Skip autofix branches to prevent recursion
    if: ${{ !startsWith(inputs.pr_branch, 'autofix/') }}
    runs-on: macos-15-xlarge
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check existing autofix
        id: check
        run: |
          EXISTING=$(gh pr list --repo "${{ github.repository }}" \
            --head "autofix/e2e-${{ inputs.pr_number }}" \
            --state open --json number --jq '.[0].number // empty')
          echo "skip=$( [ -n "$EXISTING" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_branch }}
          fetch-depth: 0

      - name: Install Claude Code
        if: steps.check.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run autofix
        if: steps.check.outputs.skip != 'true'
        run: |
          chmod +x ./scripts/e2e-autofix.sh
          ./scripts/e2e-autofix.sh \
            --pr "${{ inputs.pr_number }}" \
            --branch "${{ inputs.pr_branch }}" \
            --repo "${{ github.repository }}" \
            --failed-tests "${{ inputs.failed_tests }}" \
            --failed-flows "${{ inputs.failed_flows }}" \
            --platform ios \
            --max-attempts 2
